[theme]
primaryColor = "#0071e3"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f7"
textColor = "#1d1d1f"
font = "sans serif"

[server]
# Keep CSRF protection on (the report form mutates state) and cap photo
# uploads — bike_app/uploads.py enforces the same 10 MB limit server-side.
enableXsrfProtection = true
maxUploadSize = 10
